replicaCount: 3

image:
  repository: nginx
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 80
  targetPort: 80

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  path: /
  initialDelaySeconds: 10
  periodSeconds: 5

readinessProbe:
  path: /
  initialDelaySeconds: 5
  periodSeconds: 3

secrets:
  username: admin
  password: secret123
